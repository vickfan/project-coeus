name: 'Coeus Daily Distill and Sync'

on:
  schedule:
    # 每日凌晨 3:00 (HKT) 踢起，對應 UTC 時間係前一日嘅 19:00
    # - cron: '0 19 * * *'
  workflow_dispatch: # 容許你隨時在 GitHub 網頁手動撳掣執行測試

jobs:
  distill-and-sync:
    runs-on: 'ubuntu-latest'

    steps:
      - name: 'Checkout Mother Repo (Core)'
        uses: 'actions/checkout@v4'

      - name: 'Checkout Private Submodule (Notes)'
        uses: 'actions/checkout@v4'
        with:
          repository: '${{ vars.COEUS_USERNAME }}/${{ vars.COEUS_NOTES_REPO }}'
          token: '${{ secrets.COEUS_NOTES_TOKEN }}'
          path: 'notes'
          fetch-depth: 0

      - name: 'Setup Node.js Environment'
        uses: 'actions/setup-node@v4'
        with:
          node-version: '24'
          cache: 'npm'

      - name: 'Install Dependencies'
        run: 'npm ci'

      - name: 'Run Coeus Distill Script'
        env:
          GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}'
        run: 'node src/distill-script.js' # 呢度行你寫好嘅凌晨分流與蒸餾 Script

      - name: 'Commit and Push Changes to Private Notes'
        run: |
          cd notes
          # 設置 GitHub Action 機器人身份
          git config --local user.email 'action@github.com'
          git config --local user.name 'GitHub Action Bot'
          
          # 檢查 notes 有冇任何變更（不論係蒸餾完嘅卡片定係執走咗嘅流水帳）
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m 'chore: daily automatical distill and sync by coeus'
            git push origin main
          else
            echo "No changes in notes to commit."
          fi